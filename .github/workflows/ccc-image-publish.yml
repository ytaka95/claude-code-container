name: Build and Push Claude-Code Image

on:
  schedule:
    - cron: '0 20 * * *'   # 毎日 20:00 (UTC) に実行
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      # プラットフォームごとにビルドしてダイジェストでプッシュ（タグなし）
      - name: Build and push by digest
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg CACHE_BUST=${{ github.run_id }} \
            --build-arg BASE_IMAGE=ghcr.io/${{ github.repository }}/base \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --output type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true \
            --metadata-file /tmp/metadata.json \
            -f docker/claude-code/Dockerfile \
            .

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest=$(jq -r '."containerimage.digest"' /tmp/metadata.json)
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-slim
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log into registry ${{ env.REGISTRY }}
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      # amd64 と arm64 のダイジェストを結合してマルチアーキマニフェストを作成
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          TAGS=()
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAGS+=("${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}")

          if [ "${{ github.event_name }}" = "schedule" ]; then
            DATE_TAG=$(date -u +%Y%m%d)
            TAGS+=("${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${DATE_TAG}")
          fi

          if [ "${{ github.ref_name }}" = "${{ github.event.repository.default_branch }}" ]; then
            TAGS+=("${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest")
          fi

          TAG_ARGS=""
          for tag in "${TAGS[@]}"; do
            TAG_ARGS="${TAG_ARGS} -t ${tag}"
          done

          echo "INSPECT_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}" >> $GITHUB_ENV

          docker buildx imagetools create \
            ${TAG_ARGS} \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.INSPECT_TAG }}
