name: Build and Push Claude-Code Image

on:
  schedule:
    - cron: '0 0 * * 0'   # 毎日 0:00 (UTC) に実行
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write # GHCRへの書き込み権限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Buildx（高速・多機能なビルドツール）のセットアップ
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      # GitHub Container Registry へログイン
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # イメージのメタデータ（タグやラベル）を抽出
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ビルドとプッシュ
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: docker/claude-code/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository }}/base
