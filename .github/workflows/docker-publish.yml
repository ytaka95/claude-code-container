name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 0 * * 1'   # 毎週月曜 0:00(UTC) に定期ビルド
  workflow_dispatch:      # 手動実行を有効化
  push:
    branches: [ "main" ]  # mainブランチへのプッシュ時に実行
    tags: [ 'v*.*.*' ]    # v1.0.0 のようなタグが付いた時に実行

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHCRへの書き込み権限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Buildx（高速・多機能なビルドツール）のセットアップ
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GitHub Container Registry へログイン
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # イメージのメタデータ（タグやラベル）を抽出
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ビルドとプッシュ
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # GitHub Actionsのキャッシュを利用して高速化
          cache-to: type=gha,mode=max
